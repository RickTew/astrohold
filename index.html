<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroHold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #cce8ff;
    }
    #hud * { pointer-events: auto; }

    /* ──────────────────────────────────────────────────────────────────────
       VISUAL SYSTEM — industrial-holographic theme
       Metallic plate base + faint hex-grid pattern + holographic team
       accents. Each side has a hue family:
         - plate-*:  base metallic gradient stops
         - frame:    chunky 2px outer rim
         - frame-hi: bright accent on hover / corners
         - accent:   selected / LED color
         - text-*:   foreground typography
         - glow:     bloom around the panel + tiles
       ────────────────────────────────────────────────────────────────────── */
    :root {
      /* Metallic neutral — shared base for both sides */
      --plate-1:    #2a323d;   /* light gunmetal — top edge */
      --plate-2:    #161a22;   /* darker — body */
      --plate-3:    #0a0d13;   /* deepest — bottom */
      --plate-bevel: rgba(255, 255, 255, 0.10);
      --plate-shadow: rgba(0, 0, 0, 0.55);

      /* Defender (ROBOTS) — cyan / electric blue */
      --def-frame:    #2b4d72;
      --def-frame-hi: #6ac4ff;
      --def-accent:   #00e0ff;
      --def-text:     #d8ecff;
      --def-text-2:   #8aaecc;
      --def-glow:     rgba(0, 160, 240, 0.45);
      --def-led:      #2ee0ff;
      --def-warning-1: #6ac4ff;
      --def-warning-2: rgba(106, 196, 255, 0.10);

      /* Attacker (CYBORGS) — amber / blood red */
      --att-frame:    #7a2630;
      --att-frame-hi: #ff8c8c;
      --att-accent:   #ff5a55;
      --att-text:     #ffdadc;
      --att-text-2:   #cc9494;
      --att-glow:     rgba(230, 70, 70, 0.45);
      --att-led:      #ff5a55;
      --att-warning-1: #ff8c8c;
      --att-warning-2: rgba(255, 140, 140, 0.10);

      --cost-color:  #c8ff5a;
      --cost-shadow: rgba(140, 220, 50, 0.6);

      /* Hex-grid overlay — subtle structural texture on every panel. */
      --hex-overlay:
        repeating-linear-gradient(
          60deg,
          transparent 0 18px,
          rgba(255, 255, 255, 0.018) 18px 19px
        ),
        repeating-linear-gradient(
          -60deg,
          transparent 0 18px,
          rgba(255, 255, 255, 0.018) 18px 19px
        );
    }

    /* ── Top bar (BUILD + PLAN) ────────────────────────────────────────────
       Three-column strip. Player panel goes in column 1 or 3 depending on
       chosen side; the other outer column stays empty so the battlefield
       breathes. Center column holds the matchup badge, phase label, and
       READY button. No opponent panel or readout is rendered — opponent
       intel stays hidden until BATTLE. */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 18px;
      padding: 12px 18px 14px;
      /* Soft top-of-screen vignette so the bar reads as inset against the
         battlefield rather than floating on top of it. */
      background: linear-gradient(180deg, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.30) 70%, transparent 100%);
      pointer-events: none;
    }
    #top-bar > * { pointer-events: auto; }

    #robot-panel    { grid-column: 1; justify-self: start; }
    #center-controls{ grid-column: 2; justify-self: center; }
    #cyborg-panel   { grid-column: 3; justify-self: end; }

    /* Player side gating — the AI's panel is removed from layout entirely
       (no slim readout — opponent intel is hidden). */
    #top-bar.player-defender #cyborg-panel { display: none; }
    #top-bar.player-attacker #robot-panel  { display: none; }

    /* ── Team panel (full interactive shop) ────────────────────────────────
       Industrial-holographic look:
         - Metallic plate base (neutral gunmetal gradient)
         - Holographic team-coloured accent rim + inner bevel
         - Faint hex-grid pattern overlay (texture)
         - Corner brackets + 4 corner "rivets" (small filled squares)
         - Header has a stenciled team name + LCD-style credits readout
         - Thin warning-stripe accent band under the header
    */
    .team-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 18px 16px;
      width: 560px;
      background:
        var(--hex-overlay),
        linear-gradient(180deg, var(--plate-1) 0%, var(--plate-2) 45%, var(--plate-3) 100%);
      border: 2px solid var(--def-frame);
      box-shadow:
        /* outer holographic bloom */
        0 0 18px var(--def-glow),
        /* inner top-edge highlight */
        0 1px 0 var(--plate-bevel) inset,
        /* inner bottom-edge shadow */
        0 -1px 0 var(--plate-shadow) inset,
        /* inset glow from the team colour */
        0 0 28px var(--def-glow) inset;
    }
    .team-panel.att {
      border-color: var(--att-frame);
      box-shadow:
        0 0 18px var(--att-glow),
        0 1px 0 var(--plate-bevel) inset,
        0 -1px 0 var(--plate-shadow) inset,
        0 0 28px var(--att-glow) inset;
    }

    /* Corner brackets — chunky 4px / 22px L-shapes anchored to all four
       corners. Read as armatures bolted onto the plate. */
    .corner-bracket {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 4px solid var(--def-frame-hi);
      pointer-events: none;
      filter: drop-shadow(0 0 4px var(--def-glow));
    }
    .team-panel.att .corner-bracket {
      border-color: var(--att-frame-hi);
      filter: drop-shadow(0 0 4px var(--att-glow));
    }
    .corner-bracket.tl { top: -4px;    left: -4px;   border-right: none; border-bottom: none; }
    .corner-bracket.tr { top: -4px;    right: -4px;  border-left: none;  border-bottom: none; }
    .corner-bracket.bl { bottom: -4px; left: -4px;   border-right: none; border-top: none;    }
    .corner-bracket.br { bottom: -4px; right: -4px;  border-left: none;  border-top: none;    }

    /* Rivets — small filled squares at the four corners just inside the
       bracket. Read as fasteners holding the corner armature onto the plate.
       Implemented as box-shadow on a single ::before / ::after pseudo-element
       per panel (each pseudo-element gives 2 rivets via two shadows). */
    .team-panel::before,
    .team-panel::after {
      content: '';
      position: absolute;
      width: 4px; height: 4px;
      background: var(--def-frame-hi);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    .team-panel.att::before,
    .team-panel.att::after {
      background: var(--att-frame-hi);
    }
    .team-panel::before { top: 10px; left: 10px; }
    .team-panel::after  { top: 10px; right: 10px; }
    /* A second pair via the corner-bracket pseudo-element box-shadows would
       require pseudo-element stacking; instead the bottom-row "rivets" are
       baked into the bottom corner brackets visually. Two top rivets keep
       the look clean without clutter. */

    /* ── Panel header (team name + credits + warning stripe) ───────────── */
    .team-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      padding: 0 0 12px;
      position: relative;
    }
    /* Warning-stripe accent band under the header. Diagonal yellow/black
       hazard pattern at low opacity tinted to the team colour. */
    .team-panel .panel-header::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 4px;
      background:
        repeating-linear-gradient(
          135deg,
          var(--def-warning-1) 0 8px,
          var(--def-warning-2) 8px 16px
        );
      opacity: 0.75;
      box-shadow: 0 0 6px var(--def-glow);
    }
    .team-panel.att .panel-header::after {
      background:
        repeating-linear-gradient(
          135deg,
          var(--att-warning-1) 0 8px,
          var(--att-warning-2) 8px 16px
        );
      box-shadow: 0 0 6px var(--att-glow);
    }
    .team-panel .team-name {
      font-size: 17px;
      font-weight: bold;
      color: var(--def-frame-hi);
      text-shadow:
        0 0 14px var(--def-glow),
        0 0 2px rgba(0, 0, 0, 0.8);
      /* Stenciled feel — slight horizontal scratch via background-clip text. */
      position: relative;
    }
    .team-panel.att .team-name {
      color: var(--att-frame-hi);
      text-shadow:
        0 0 14px var(--att-glow),
        0 0 2px rgba(0, 0, 0, 0.8);
    }
    /* LCD-style credit readout — recessed black slot with green numerals. */
    .team-panel .team-credits {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: linear-gradient(180deg, #050a10 0%, #0b1320 100%);
      border: 1px solid rgba(0, 0, 0, 0.6);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06) inset,
        0 2px 4px rgba(0, 0, 0, 0.5) inset;
      font-size: 13px;
      letter-spacing: 3px;
      color: rgba(200, 230, 255, 0.55);
    }
    .team-panel .team-credits .cr-num {
      color: var(--cost-color);
      font-weight: bold;
      text-shadow: 0 0 8px var(--cost-shadow);
      letter-spacing: 1px;
    }

    .team-panel .panel-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    /* ── Shop tile (icon + label + cost + LED) ─────────────────────────────
       Industrial slot: dark recessed body, lit-up team-coloured LED bar
       along the bottom, sprite icon centred, label + cost beneath in
       stenciled monospace. */
    .shop-icon-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 9px 6px 9px;
      cursor: pointer;
      background: linear-gradient(180deg, #1a2230 0%, #0b1018 100%);
      border: 1px solid #353d4a;
      color: var(--def-text-2);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 -2px 4px rgba(0, 0, 0, 0.45) inset;
      transition: transform 0.08s ease-out, border-color 0.12s, box-shadow 0.12s, color 0.12s;
    }
    /* Inner highlight — a 1px line at the top edge to suggest a lit bevel. */
    .shop-icon-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    }
    /* Bottom LED indicator strip — dim by default, lights up on hover/selected. */
    .shop-icon-btn::after {
      content: '';
      position: absolute;
      left: 8px; right: 8px;
      bottom: 2px;
      height: 2px;
      background: var(--def-led);
      opacity: 0.35;
      box-shadow: 0 0 6px var(--def-led);
      transition: opacity 0.12s, box-shadow 0.12s;
    }
    .team-panel.att .shop-icon-btn::after {
      background: var(--att-led);
      box-shadow: 0 0 6px var(--att-led);
    }
    .shop-icon-btn:hover {
      border-color: var(--def-frame-hi);
      color: var(--def-text);
      transform: translateY(-1px);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -2px 4px rgba(0, 0, 0, 0.50) inset,
        0 0 14px var(--def-glow);
    }
    .shop-icon-btn:hover::after { opacity: 0.85; box-shadow: 0 0 10px var(--def-led); }
    .team-panel.att .shop-icon-btn:hover::after { box-shadow: 0 0 10px var(--att-led); }
    .shop-icon-btn.selected {
      border-color: var(--def-accent);
      color: #eaf8ff;
      box-shadow:
        0 0 0 1px var(--def-accent) inset,
        0 0 18px var(--def-glow);
    }
    .shop-icon-btn.selected::after { opacity: 1; box-shadow: 0 0 14px var(--def-led); }
    .team-panel.att .shop-icon-btn.selected::after { box-shadow: 0 0 14px var(--att-led); }

    .shop-icon-btn .icon {
      position: relative;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        /* radial vignette for a "lit slot" feel */
        radial-gradient(ellipse at 50% 45%, rgba(50, 70, 100, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #050810 0%, #020407 100%);
      border: 1px solid #2a3140;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 3px 4px rgba(0, 0, 0, 0.55) inset;
    }
    .team-panel.att .shop-icon-btn .icon {
      background:
        radial-gradient(ellipse at 50% 45%, rgba(100, 50, 50, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #100408 0%, #060203 100%);
    }
    /* Sprites carry transparent padding around the subject — upscaling
       inside the tile is the only way to make small pixel-art read at
       this thumbnail size. Per-piece scale lets us tune the few outliers
       (Cannon, Sniper feel small at 1.6×; Hulk is fine smaller). */
    .shop-icon-btn .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(var(--icon-scale, 1.65));
      transform-origin: center 55%;  /* shift down a hair — most sprites have headroom */
    }
    .shop-icon-btn[data-type="cannon"]    .icon img { --icon-scale: 1.85; }
    .shop-icon-btn[data-type="sniper"]    .icon img { --icon-scale: 1.85; }
    .shop-icon-btn[data-type="grenadier"] .icon img { --icon-scale: 1.75; }
    .shop-icon-btn[data-type="doublegun"] .icon img { --icon-scale: 1.65; }
    .shop-icon-btn[data-type="hulk"]      .icon img { --icon-scale: 1.55; }
    .shop-icon-btn#sphere-btn             .icon img { --icon-scale: 1.45; }
    .shop-icon-btn[data-type="turret"]    .icon img { --icon-scale: 1.55; }
    .shop-icon-btn[data-type="bomber"]    .icon img { --icon-scale: 1.55; }
    .shop-icon-btn#dog-btn                .icon img { --icon-scale: 1.85; }

    /* Wall placeholder — diagonal-hatch slab styled to feel like an in-game
       barrier rather than a missing-asset stub. */
    .shop-icon-btn .icon-wall {
      width: 50px;
      height: 50px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(0,0,0,0.10) 100%),
        repeating-linear-gradient(45deg, #6688aa 0 5px, #334455 5px 10px);
      border: 1px solid #88aacc;
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 -1px 0 rgba(0,0,0,0.35) inset;
    }
    .shop-icon-btn .label {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: inherit;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .shop-icon-btn .cost {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--cost-color);
    }

    /* Cyborg side — same chassis colour, red accent ring. */
    .team-panel.att .shop-icon-btn { color: var(--att-text-2); }
    .team-panel.att .shop-icon-btn:hover {
      border-color: var(--att-frame-hi);
      color: var(--att-text);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -2px 4px rgba(0, 0, 0, 0.50) inset,
        0 0 14px var(--att-glow);
    }
    .team-panel.att .shop-icon-btn.selected {
      border-color: var(--att-accent);
      color: #ffeaea;
      box-shadow:
        0 0 0 1px var(--att-accent) inset,
        0 0 18px var(--att-glow);
    }

    /* Preview pieces — single-direction renders pending full rotations.
       Dashed border + reduced opacity so the player can see they're WIP. */
    .shop-icon-btn.preview {
      border-style: dashed;
      opacity: 0.75;
    }

    /* Insufficient credits. */
    .shop-icon-btn.insufficient {
      opacity: 0.30;
      cursor: not-allowed;
      filter: grayscale(0.6);
    }

    /* PLAN phase: shop visible but inert. */
    .team-panel.disabled .panel-grid {
      pointer-events: none;
      opacity: 0.55;
      filter: saturate(0.6);
    }

    /* ── Centre controls: VS badge · phase label · READY button · intel ─── */
    #center-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 6px 14px;
      min-width: 240px;
    }

    /* Matchup badge — small chip identifying the opponent + AI tag. No
       numbers — only the team name + "AI" label. */
    #vs-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--def-text-2);
      background: linear-gradient(180deg, rgba(20, 28, 40, 0.85) 0%, rgba(8, 12, 18, 0.85) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
    }
    #vs-badge.att { color: var(--att-text-2); }
    #vs-badge .vs-label { opacity: 0.55; }
    #vs-badge .vs-opponent {
      font-weight: bold;
      color: var(--def-frame-hi);
      text-shadow: 0 0 6px var(--def-glow);
    }
    #vs-badge.att .vs-opponent {
      color: var(--att-frame-hi);
      text-shadow: 0 0 6px var(--att-glow);
    }
    #vs-badge .vs-tag {
      font-size: 9px;
      letter-spacing: 2px;
      padding: 1px 6px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.20);
      color: #b0c4d6;
    }

    /* Phase display — clean monospaced chiplet with bracket marks. The
       inner span carries the actual text so the brackets stay stable
       regardless of phase length. */
    #phase-display {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 6px;
      color: #d4ecff;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.55);
    }
    #phase-display::before,
    #phase-display::after {
      content: '';
      width: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--def-frame-hi));
      opacity: 0.70;
    }
    #phase-display::after {
      background: linear-gradient(90deg, var(--def-frame-hi), transparent);
    }

    /* READY / BATTLE — industrial pushbutton. A raised "cap" sits on a
       deeper recessed "well", with a small LED indicator on the left. */
    #battle-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 36px 12px 24px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 6px;
      white-space: nowrap;
      color: #ffe8c4;
      /* Industrial chrome — orange-amber pushbutton */
      background:
        linear-gradient(180deg, #4a1810 0%, #2a0a06 60%, #0e0402 100%);
      border: 2px solid #ff7a2a;
      box-shadow:
        /* outer halo */
        0 0 24px rgba(255, 120, 40, 0.55),
        /* inner top highlight */
        0 1px 0 rgba(255, 200, 130, 0.35) inset,
        /* deeper inset */
        0 -3px 6px rgba(0, 0, 0, 0.55) inset,
        /* sharp inner ring */
        0 0 0 1px rgba(255, 140, 60, 0.40) inset;
      transition: transform 0.06s ease-out, color 0.12s, box-shadow 0.12s, background 0.12s, border-color 0.12s;
    }
    #battle-btn .btn-led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff2c8 0%, #ffaa44 35%, #663010 100%);
      box-shadow:
        0 0 8px #ff8030,
        0 0 0 1px rgba(0, 0, 0, 0.5);
    }
    #battle-btn .btn-text {
      text-shadow:
        0 0 10px rgba(255, 140, 60, 0.85),
        0 1px 0 rgba(0, 0, 0, 0.5);
    }
    #battle-btn:hover {
      transform: translateY(-1px);
      border-color: #ffa050;
      color: #fff4dc;
      background:
        linear-gradient(180deg, #6a2418 0%, #3a1008 60%, #150602 100%);
      box-shadow:
        0 0 36px rgba(255, 150, 50, 0.85),
        0 1px 0 rgba(255, 220, 160, 0.45) inset,
        0 -3px 6px rgba(0, 0, 0, 0.55) inset,
        0 0 0 1px rgba(255, 180, 90, 0.60) inset;
    }
    #battle-btn:hover .btn-led {
      box-shadow:
        0 0 14px #ffaa30,
        0 0 0 1px rgba(0, 0, 0, 0.5);
    }
    #battle-btn:active {
      transform: translateY(0);
      box-shadow:
        0 0 18px rgba(255, 120, 40, 0.50),
        0 -1px 0 rgba(255, 220, 160, 0.20) inset,
        0 3px 5px rgba(0, 0, 0, 0.55) inset,
        0 0 0 1px rgba(255, 140, 60, 0.45) inset;
    }

    /* Intel-redacted status line — fog-of-war indicator under the button. */
    #intel-status {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      color: #6a7c90;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px dashed rgba(140, 160, 180, 0.30);
      background: rgba(0, 0, 0, 0.3);
      animation: intelPulse 2.8s ease-in-out infinite;
    }
    @keyframes intelPulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.85; }
    }

    /* ── Plan-phase instruction strip ─────────────────────────────────── */
    #plan-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px;
      background: linear-gradient(0deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.30) 100%);
    }
    #plan-instructions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-family: 'Courier New', monospace;
      color: #aac6d8;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }
    #plan-instructions strong {
      color: #ffe88a;
      letter-spacing: 3px;
      font-size: 13px;
      text-shadow: 0 0 8px rgba(255, 200, 60, 0.4);
    }

    /* ── Side picker (shown after load, before BUILD) ─────────────────────
       Full-screen modal with two industrial team cards. Same metallic-
       plate base as the in-game panels so the side-picker feels like part
       of the same UI system, not a separate splash screen. */
    #side-picker {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      background:
        /* faint star-field-ish noise dots */
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.06) 0%, transparent 1px),
        radial-gradient(circle at 75% 70%, rgba(255, 255, 255, 0.04) 0%, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 1px),
        /* deep space vignette */
        radial-gradient(ellipse at center, rgba(12, 18, 32, 0.92) 0%, rgba(0, 0, 0, 0.98) 70%);
      font-family: 'Courier New', monospace;
      z-index: 100;
    }
    #side-picker .sp-title {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      letter-spacing: 12px;
      color: #6ac4ff;
      text-shadow: 0 0 14px var(--def-glow);
    }
    #side-picker .sp-title::before,
    #side-picker .sp-title::after {
      content: '';
      width: 70px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #6ac4ff);
      opacity: 0.55;
    }
    #side-picker .sp-title::after {
      background: linear-gradient(90deg, #6ac4ff, transparent);
    }
    #side-picker .sp-headline {
      font-size: 30px;
      letter-spacing: 14px;
      color: #e6f3ff;
      text-shadow:
        0 0 22px rgba(60, 140, 220, 0.7),
        0 1px 0 rgba(0, 0, 0, 0.8);
      margin-top: -36px;
    }
    #side-picker .sp-cards {
      display: flex;
      gap: 48px;
      align-items: stretch;
    }
    .sp-card {
      position: relative;
      width: 340px;
      padding: 26px 28px 30px;
      background:
        var(--hex-overlay),
        linear-gradient(180deg, var(--plate-1) 0%, var(--plate-2) 45%, var(--plate-3) 100%);
      border: 2px solid var(--def-frame);
      color: var(--def-text);
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s ease-out, border-color 0.15s, box-shadow 0.15s;
      box-shadow:
        0 0 24px var(--def-glow),
        0 1px 0 var(--plate-bevel) inset,
        0 -1px 0 var(--plate-shadow) inset,
        0 0 32px var(--def-glow) inset;
    }
    .sp-card.att {
      border-color: var(--att-frame);
      color: var(--att-text);
      box-shadow:
        0 0 24px var(--att-glow),
        0 1px 0 var(--plate-bevel) inset,
        0 -1px 0 var(--plate-shadow) inset,
        0 0 32px var(--att-glow) inset;
    }
    .sp-card:hover {
      transform: translateY(-3px);
      border-color: var(--def-frame-hi);
      box-shadow:
        0 0 36px var(--def-glow),
        0 1px 0 var(--plate-bevel) inset,
        0 -1px 0 var(--plate-shadow) inset,
        0 0 44px var(--def-glow) inset;
    }
    .sp-card.att:hover {
      border-color: var(--att-frame-hi);
      box-shadow:
        0 0 36px var(--att-glow),
        0 1px 0 var(--plate-bevel) inset,
        0 -1px 0 var(--plate-shadow) inset,
        0 0 44px var(--att-glow) inset;
    }
    .sp-card .sp-team-name {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 8px;
      color: var(--def-frame-hi);
      text-shadow: 0 0 14px var(--def-glow);
      margin-bottom: 4px;
    }
    .sp-card.att .sp-team-name {
      color: var(--att-frame-hi);
      text-shadow: 0 0 14px var(--att-glow);
    }
    .sp-card .sp-role {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--def-text-2);
      margin-bottom: 22px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(106, 196, 255, 0.20);
    }
    .sp-card.att .sp-role {
      color: var(--att-text-2);
      border-bottom-color: rgba(255, 140, 140, 0.20);
    }
    .sp-card .sp-hero {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 22px;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(50, 70, 100, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #050810 0%, #020407 100%);
      border: 1px solid #2a3140;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 3px 6px rgba(0, 0, 0, 0.55) inset,
        0 0 18px var(--def-glow);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .sp-card.att .sp-hero {
      background:
        radial-gradient(ellipse at 50% 45%, rgba(100, 50, 50, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #100408 0%, #060203 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 3px 6px rgba(0, 0, 0, 0.55) inset,
        0 0 18px var(--att-glow);
    }
    .sp-card .sp-hero img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(1.4);
    }
    .sp-card .sp-tagline {
      font-size: 12px;
      letter-spacing: 1.5px;
      line-height: 1.6;
      color: var(--def-text-2);
      margin-bottom: 22px;
      min-height: 40px;
    }
    .sp-card.att .sp-tagline { color: var(--att-text-2); }
    .sp-card .sp-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 5px;
      color: var(--def-text);
      background:
        linear-gradient(180deg, #143a60 0%, #082040 60%, #03101e 100%);
      border: 2px solid var(--def-frame-hi);
      box-shadow:
        0 0 0 1px rgba(108, 196, 255, 0.25) inset,
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset,
        0 0 14px var(--def-glow);
    }
    .sp-card.att .sp-cta {
      color: var(--att-text);
      background:
        linear-gradient(180deg, #5a121c 0%, #2a0408 60%, #100204 100%);
      border-color: var(--att-frame-hi);
      box-shadow:
        0 0 0 1px rgba(255, 138, 138, 0.25) inset,
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset,
        0 0 14px var(--att-glow);
    }
    .sp-card:hover .sp-cta { box-shadow:
      0 0 0 1px rgba(108, 196, 255, 0.50) inset,
      0 1px 0 rgba(255, 255, 255, 0.16) inset,
      0 -2px 4px rgba(0, 0, 0, 0.40) inset,
      0 0 22px var(--def-glow);
    }
    .sp-card.att:hover .sp-cta { box-shadow:
      0 0 0 1px rgba(255, 138, 138, 0.50) inset,
      0 1px 0 rgba(255, 255, 255, 0.16) inset,
      0 -2px 4px rgba(0, 0, 0, 0.40) inset,
      0 0 22px var(--att-glow);
    }

    /* Selected-piece panel during planning — sits just below the top bar
       on the right so it doesn't overlap the CYBORGS panel header. */
    #plan-selection {
      position: absolute;
      top: 150px;
      right: 16px;
      width: 240px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid #335577;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaccdd;
      line-height: 1.5;
    }
    .plan-sel-header {
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: 0 0 6px currentColor;
    }
    .plan-sel-ap {
      color: #ffee88;
      margin-bottom: 6px;
    }
    .plan-sel-ap strong { color: #fff; font-size: 14px; }
    .plan-sel-queue {
      color: #88aabb;
      font-size: 11px;
      padding-top: 4px;
      border-top: 1px solid #334455;
    }
    .plan-sel-queue em { color: #556677; }

    /* Compass-rose popup — opens with shift+click on a placed firing structure
       during BUILD. Lets the player pay credits to add extra fire-arc facings.
       Positioned absolutely; Game projects the structure's world position to
       screen coords and pins the rose there on open. */
    #compass-rose {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: auto repeat(3, 44px);
      gap: 4px;
      padding: 8px;
      background: rgba(0, 8, 20, 0.92);
      border: 1px solid #2266aa;
      box-shadow: 0 0 18px rgba(0, 80, 160, 0.45);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #aaccdd;
    }
    #compass-rose .rose-title {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #88ccff;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    #compass-rose .rose-title span { flex: 1; text-align: center; }
    #compass-rose .rose-close-btn {
      width: 20px; height: 20px;
      padding: 0;
      background: transparent;
      border: 1px solid #335577;
      color: #99bbcc;
      font-family: inherit;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    #compass-rose .rose-close-btn:hover {
      background: #2a0010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-footer {
      grid-column: 1 / 4;
      margin-top: 4px;
      display: flex; justify-content: center;
    }
    #compass-rose .rose-refund-btn {
      flex: 1;
      padding: 6px 8px;
      background: #2a0008;
      border: 1px solid #661122;
      color: #ddaaaa;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #compass-rose .rose-refund-btn:hover {
      background: #440010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
      cursor: pointer;
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
    }
    #compass-rose .rose-btn:hover { background: #102840; border-color: #2266aa; }
    #compass-rose .rose-btn.active {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      cursor: default;
      text-shadow: 0 0 6px #00aaff;
    }
    #compass-rose .rose-btn.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }
    #compass-rose .rose-btn .rose-arrow { font-size: 16px; line-height: 1; }
    #compass-rose .rose-btn .rose-cost  { font-size: 9px; color: #99cc66; }
    #compass-rose .rose-btn .rose-on    { font-size: 8px; color: #66ccff; letter-spacing: 1px; }
    #compass-rose .rose-center {
      background: transparent;
      border: 1px dashed #335577;
      color: #6699bb;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }

    /* Combat history log — wide bottom strip during BATTLE. The mock-up
       command-deck look: dark frame, clipped corners, D&D-style coloured
       rows. Hidden during BUILD/PLAN (the top bar already busy enough). */
    #combat-log {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(1000px, calc(100vw - 32px));
      max-height: 26vh;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(8,12,20,0.92) 0%, rgba(0,4,10,0.88) 100%);
      border: 1px solid #224466;
      box-shadow: 0 0 14px rgba(0, 80, 160, 0.25) inset;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #99bbcc;
      overflow-y: auto;
      scrollbar-width: thin;
      clip-path: polygon(
        10px 0,
        calc(100% - 10px) 0,
        100% 10px,
        100% calc(100% - 10px),
        calc(100% - 10px) 100%,
        10px 100%,
        0 calc(100% - 10px),
        0 10px
      );
    }
    #combat-log .log-turn {
      color: #ffcc66;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 6px 0 4px;
      border-bottom: 1px dashed #443322;
      padding-bottom: 2px;
    }
    #combat-log .log-turn:first-child { margin-top: 0; }
    #combat-log .log-entry { padding: 1px 0; }
    #combat-log .log-entry.defender { color: #88bbdd; }
    #combat-log .log-entry.attacker { color: #dd8888; }
    #combat-log .log-entry.neutral  { color: #ffaa44; font-weight: bold; }
    #combat-log .log-empty { color: #556677; font-style: italic; }

    #game-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 52px;
      letter-spacing: 6px;
      text-shadow: 0 0 24px currentColor;
      pointer-events: none;
      text-align: center;
    }
    #game-message small {
      display: block;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.7;
    }

    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      letter-spacing: 3px;
      color: #4488aa;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
