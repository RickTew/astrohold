<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroHold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      /* Reserved TOP strip for the command-deck HUD. Canvas + camera
         shrink vertically by this amount and sit below the HUD so the
         battlefield is never overlapped by panels. Keep in sync with
         Game.HUD_TOP_HEIGHT and BuildPhase canvas-height calc. */
      --hud-top-h: 210px;
    }
    body { background: #000; overflow: hidden; }
    canvas {
      display: block;
      position: absolute;
      top: var(--hud-top-h);
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--hud-top-h));
    }

    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #cce8ff;
    }
    #hud * { pointer-events: auto; }

    /* ── Top HUD strip (BUILD + PLAN) ─────────────────────────────────────
       Three-panel command deck per reference image. LEFT and RIGHT side
       panels hold the unit/structure tiles (2 rows × 5 cols = 10 each);
       CENTER panel holds the phase banner, credits chip, VS chip, and
       event log. Three small status glyphs cluster in the top-right
       corner outside the panels.

       All panels render their silhouette via inline SVG with non-scaling
       strokes so the corners stay crisp at any width. Content sits over
       the SVG in absolutely-positioned overlays. */
    #hud-top, #hud-top-att {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: var(--hud-top-h);
      display: grid;
      grid-template-columns: 1fr minmax(360px, 28%) 1fr;
      gap: 6px;
      padding: 6px 16px 8px;
      pointer-events: none;
    }
    #hud-top > *, #hud-top-att > * { pointer-events: auto; }

    .hud-panel {
      position: relative;
      min-width: 0;
      height: 100%;
    }
    .hud-panel .panel-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      filter: drop-shadow(0 0 6px rgba(90, 167, 212, 0.30));
    }
    .hud-panel[data-side="att"] .panel-frame {
      filter: drop-shadow(0 0 6px rgba(212, 90, 122, 0.30));
    }

    /* Content overlay — leaves room for the chamfered corners by inseting
       on left/right and giving a top offset that respects the SVG outline.
       Center panel's top inset is deeper to clear its raised banner. */
    .hud-panel .panel-content {
      position: absolute;
      inset: 12px 18px 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hud-center .panel-content {
      inset: 14px 24px 12px 24px;
    }

    /* ── Tile grid ───────────────────────────────────────────────────── */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(2, 1fr);
      gap: 5px;
      width: 100%;
      height: 100%;
    }
    .hud-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1px;
      padding: 4px 2px 4px;
      cursor: pointer;
      background: linear-gradient(180deg, #0d1c2e 0%, #061320 100%);
      border: 1px solid #2a5577;
      color: #88c5e0;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      transition: border-color 0.1s, box-shadow 0.1s, transform 0.06s;
      min-width: 0;
    }
    .hud-tile.att {
      background: linear-gradient(180deg, #2e0d18 0%, #200612 100%);
      border-color: #77294a;
      color: #e088a0;
    }
    .hud-tile:hover {
      border-color: #6ac4ff;
      box-shadow: 0 0 6px rgba(106, 196, 255, 0.55);
      transform: translateY(-1px);
    }
    .hud-tile.att:hover {
      border-color: #ff7a9a;
      box-shadow: 0 0 6px rgba(255, 122, 154, 0.55);
    }
    .hud-tile.selected {
      border-color: #00e0ff;
      background: linear-gradient(180deg, #144066 0%, #082240 100%);
      color: #d0f0ff;
      box-shadow: 0 0 8px rgba(0, 224, 255, 0.65), 0 0 0 1px #00e0ff inset;
    }
    .hud-tile.att.selected {
      border-color: #ff5a78;
      background: linear-gradient(180deg, #5a1230 0%, #2a0612 100%);
      color: #ffd0e0;
      box-shadow: 0 0 8px rgba(255, 90, 120, 0.65), 0 0 0 1px #ff5a78 inset;
    }
    .hud-tile.preview { border-style: dashed; opacity: 0.78; }
    .hud-tile.insufficient { opacity: 0.32; cursor: not-allowed; filter: grayscale(0.5); }
    /* When the WHOLE strip is disabled (PLAN phase), the tiles still show
       but can't be clicked. */
    #hud-top.disabled .tile-grid, #hud-top-att.disabled .tile-grid {
      pointer-events: none;
      opacity: 0.55;
      filter: saturate(0.6);
    }

    .hud-tile .tile-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 45%, rgba(40, 70, 100, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%);
      border: 1px solid rgba(106, 196, 255, 0.30);
    }
    .hud-tile.att .tile-icon {
      background: radial-gradient(ellipse at 50% 45%, rgba(100, 40, 60, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%);
      border-color: rgba(255, 122, 154, 0.30);
    }
    .hud-tile .tile-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(1.55);
      transform-origin: center 55%;
    }
    .hud-tile.preview .tile-icon img {
      transform: scale(1.0);
      transform-origin: center;
    }
    .hud-tile .icon-wall {
      width: 32px; height: 32px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(0,0,0,0.10) 100%),
        repeating-linear-gradient(45deg, #6688aa 0 4px, #334455 4px 8px);
      border: 1px solid #88aacc;
    }
    .hud-tile .tile-label {
      font-size: 9px;
      letter-spacing: 1px;
      margin-top: 1px;
      color: inherit;
    }
    .hud-tile .tile-cost {
      font-size: 9px;
      letter-spacing: 0.5px;
      color: #c8ff7a;
    }

    /* ── Center panel content ─────────────────────────────────────────── */
    .hud-center .center-banner-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 6px;
    }
    .hud-center .center-phase {
      flex: 1;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 5px;
      color: #e6f3ff;
      text-shadow: 0 0 10px rgba(60, 170, 230, 0.7);
    }
    .hud-panel[data-side="att"] .center-phase {
      text-shadow: 0 0 10px rgba(230, 80, 120, 0.7);
    }
    .hud-center .center-credits {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: linear-gradient(180deg, #050a10 0%, #0b1320 100%);
      border: 1px solid rgba(0, 0, 0, 0.6);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06) inset,
        0 2px 4px rgba(0, 0, 0, 0.5) inset;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(200, 230, 255, 0.55);
    }
    .hud-center .center-credits .cr-num {
      color: #c8ff7a;
      font-weight: bold;
      font-size: 12px;
      margin-left: 4px;
      text-shadow: 0 0 6px rgba(160, 220, 60, 0.6);
    }
    .hud-center .center-vs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 2px 8px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: #8aabc4;
    }
    .hud-center .center-vs .vs-label { opacity: 0.55; }
    .hud-center .center-vs .vs-team {
      font-weight: bold;
      color: #ff7a9a;
      text-shadow: 0 0 6px rgba(230, 80, 120, 0.55);
    }
    .hud-panel[data-side="att"] .center-vs .vs-team {
      color: #6ac4ff;
      text-shadow: 0 0 6px rgba(60, 170, 230, 0.55);
    }
    .hud-center .center-vs .vs-ai {
      font-size: 9px;
      padding: 0 5px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.20);
      color: #b8cad8;
    }

    /* Event log — recessed dark slot inside the center panel. */
    .hud-center .event-log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 4px 8px;
      background: linear-gradient(180deg, #030710 0%, #02050b 100%);
      border: 1px solid rgba(0, 0, 0, 0.7);
      box-shadow:
        0 0 0 1px rgba(106, 196, 255, 0.15) inset,
        0 3px 4px rgba(0, 0, 0, 0.55) inset;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      line-height: 1.45;
      color: #a3bdd3;
      scrollbar-width: thin;
      scrollbar-color: rgba(106, 196, 255, 0.20) transparent;
    }
    .hud-panel[data-side="att"] .event-log {
      box-shadow:
        0 0 0 1px rgba(255, 122, 154, 0.15) inset,
        0 3px 4px rgba(0, 0, 0, 0.55) inset;
      color: #d8b8b8;
    }
    .hud-center .event-log .event-row { padding: 1px 0; }
    .hud-center .event-log .ev-time { color: #5a7a90; margin-right: 4px; }

    /* ── Corner status glyphs (top-right) ─────────────────────────────── */
    .hud-corner-status {
      position: absolute;
      top: 6px; right: 8px;
      display: flex;
      gap: 8px;
      color: #6ac4ff;
      opacity: 0.6;
      pointer-events: none;
    }
    .hud-corner-status.att { color: #ff7a9a; }
    .hud-corner-status .status-glyph {
      width: 20px; height: 20px;
      filter: drop-shadow(0 0 4px currentColor);
    }

    /* Hide AI side's HUD entirely. */
    .ai-side { display: none !important; }

    /* Bottom bar — READY button */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px;
      pointer-events: none;
    }
    #bottom-bar > * { pointer-events: auto; }

    #battle-btn, #plan-battle-btn {
      background: linear-gradient(180deg, #4a0814 0%, #2a040a 60%, #0e0204 100%);
      border: 2px solid #c4441c;
      color: #ffe0b8;
      padding: 10px 30px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: center;
      box-shadow:
        0 0 18px rgba(255, 120, 40, 0.55),
        0 1px 0 rgba(255, 200, 130, 0.30) inset;
      transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    }
    #battle-btn:hover, #plan-battle-btn:hover {
      border-color: #ff7a3a;
      color: #fff1d8;
      box-shadow:
        0 0 26px rgba(255, 150, 50, 0.85),
        0 1px 0 rgba(255, 220, 160, 0.40) inset;
    }

    #battle-btn, #plan-battle-btn {
      background: #2a0000;
      border: 2px solid #aa2200;
      color: #ff8866;
      padding: 10px 24px;
      font-size: 17px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: center;
      transition: background 0.1s, border-color 0.1s;
    }
    #battle-btn:hover, #plan-battle-btn:hover {
      background: #440000;
      border-color: #ff4400;
      color: #ffaa88;
    }

    /* Plan-phase bottom bar — narrower than build bar, just instructions + Battle */
    #plan-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.5);
    }
    #plan-instructions {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-family: 'Courier New', monospace;
      color: #99bbcc;
      font-size: 12px;
      line-height: 1.4;
    }
    #plan-instructions strong {
      color: #ffee66;
      letter-spacing: 2px;
      font-size: 13px;
    }

    /* Selected-piece panel — top-right corner during planning */
    #plan-selection {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 240px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid #335577;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaccdd;
      line-height: 1.5;
    }
    .plan-sel-header {
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: 0 0 6px currentColor;
    }
    .plan-sel-ap {
      color: #ffee88;
      margin-bottom: 6px;
    }
    .plan-sel-ap strong { color: #fff; font-size: 14px; }
    .plan-sel-queue {
      color: #88aabb;
      font-size: 11px;
      padding-top: 4px;
      border-top: 1px solid #334455;
    }
    .plan-sel-queue em { color: #556677; }

    /* Compass-rose popup — opens with shift+click on a placed firing structure
       during BUILD. Lets the player pay credits to add extra fire-arc facings.
       Positioned absolutely; Game projects the structure's world position to
       screen coords and pins the rose there on open. */
    #compass-rose {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: auto repeat(3, 44px);
      gap: 4px;
      padding: 8px;
      background: rgba(0, 8, 20, 0.92);
      border: 1px solid #2266aa;
      box-shadow: 0 0 18px rgba(0, 80, 160, 0.45);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #aaccdd;
    }
    #compass-rose .rose-title {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #88ccff;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    #compass-rose .rose-title span { flex: 1; text-align: center; }
    #compass-rose .rose-close-btn {
      width: 20px; height: 20px;
      padding: 0;
      background: transparent;
      border: 1px solid #335577;
      color: #99bbcc;
      font-family: inherit;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    #compass-rose .rose-close-btn:hover {
      background: #2a0010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-footer {
      grid-column: 1 / 4;
      margin-top: 4px;
      display: flex; justify-content: center;
    }
    #compass-rose .rose-refund-btn {
      flex: 1;
      padding: 6px 8px;
      background: #2a0008;
      border: 1px solid #661122;
      color: #ddaaaa;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #compass-rose .rose-refund-btn:hover {
      background: #440010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
      cursor: pointer;
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
    }
    #compass-rose .rose-btn:hover { background: #102840; border-color: #2266aa; }
    #compass-rose .rose-btn.active {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      cursor: default;
      text-shadow: 0 0 6px #00aaff;
    }
    #compass-rose .rose-btn.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }
    #compass-rose .rose-btn .rose-arrow { font-size: 16px; line-height: 1; }
    #compass-rose .rose-btn .rose-cost  { font-size: 9px; color: #99cc66; }
    #compass-rose .rose-btn .rose-on    { font-size: 8px; color: #66ccff; letter-spacing: 1px; }
    #compass-rose .rose-center {
      background: transparent;
      border: 1px dashed #335577;
      color: #6699bb;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }

    /* Combat history log — right-rail D&D turn log. Visible during BATTLE
       and the win/lose overlay so the player can review what happened. Hidden
       during BUILD (the cyborg shop occupies this corner) and PLAN (the
       plan-selection panel does). */
    #combat-log {
      position: absolute;
      top: 60px;
      right: 12px;
      width: 280px;
      max-height: calc(100vh - 160px);
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid #224466;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.45;
      color: #99bbcc;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    #combat-log .log-turn {
      color: #ffcc66;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 6px 0 4px;
      border-bottom: 1px dashed #443322;
      padding-bottom: 2px;
    }
    #combat-log .log-turn:first-child { margin-top: 0; }
    #combat-log .log-entry { padding: 1px 0; }
    #combat-log .log-entry.defender { color: #88bbdd; }
    #combat-log .log-entry.attacker { color: #dd8888; }
    #combat-log .log-entry.neutral  { color: #ffaa44; font-weight: bold; }
    #combat-log .log-empty { color: #556677; font-style: italic; }

    #game-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 52px;
      letter-spacing: 6px;
      text-shadow: 0 0 24px currentColor;
      pointer-events: none;
      text-align: center;
    }
    #game-message small {
      display: block;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.7;
    }

    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      letter-spacing: 3px;
      color: #4488aa;
    }

    .hidden { display: none !important; }

    /* Single-player gating — the AI's shop panel + credits + team label all
       carry .ai-side after setPlayerSide() runs, hiding them entirely so the
       player can't see or interact with opponent intel. */
    .ai-side { display: none !important; }

    /* ── Side picker (full-screen modal shown after asset preload) ───────
       Two team cards with hero sprite + role tagline + CTA button. */
    #side-picker {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.06) 0%, transparent 1px),
        radial-gradient(circle at 75% 70%, rgba(255, 255, 255, 0.04) 0%, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 1px),
        radial-gradient(ellipse at center, rgba(12, 18, 32, 0.92) 0%, rgba(0, 0, 0, 0.98) 70%);
      font-family: 'Courier New', monospace;
      z-index: 100;
    }
    #side-picker .sp-title {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      letter-spacing: 12px;
      color: #6ac4ff;
      text-shadow: 0 0 14px rgba(0, 160, 240, 0.45);
    }
    #side-picker .sp-title::before,
    #side-picker .sp-title::after {
      content: '';
      width: 70px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #6ac4ff);
      opacity: 0.55;
    }
    #side-picker .sp-title::after { background: linear-gradient(90deg, #6ac4ff, transparent); }
    #side-picker .sp-headline {
      font-size: 30px;
      letter-spacing: 14px;
      color: #e6f3ff;
      text-shadow: 0 0 22px rgba(60, 140, 220, 0.7), 0 1px 0 rgba(0, 0, 0, 0.8);
      margin-top: -36px;
    }
    #side-picker .sp-cards {
      display: flex;
      gap: 48px;
      align-items: stretch;
    }
    .sp-card {
      position: relative;
      width: 340px;
      padding: 26px 28px 30px;
      background:
        repeating-linear-gradient(60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        repeating-linear-gradient(-60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        linear-gradient(180deg, #2a323d 0%, #161a22 45%, #0a0d13 100%);
      border: 2px solid #2b4d72;
      color: #d8ecff;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s ease-out, border-color 0.15s, box-shadow 0.15s;
      box-shadow:
        0 0 24px rgba(0, 160, 240, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset,
        0 0 32px rgba(0, 160, 240, 0.45) inset;
    }
    .sp-card.att {
      background:
        repeating-linear-gradient(60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        repeating-linear-gradient(-60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        linear-gradient(180deg, #2a323d 0%, #161a22 45%, #0a0d13 100%);
      border-color: #7a2630;
      color: #ffdadc;
      box-shadow:
        0 0 24px rgba(230, 70, 70, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
