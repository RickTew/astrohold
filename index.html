<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale + user-scalable=no stop browser pinch-zoom on Chrome/Android
       (so only the in-game camera zooms). iOS ignores these, so Game.ts also
       blocks iOS 'gesturestart' pinch events directly. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AstroHold</title>
  <!-- App icon: "Delta Fighter" A-spaceship (picked on /icon-test.html).
       SVG favicon + PWA manifest icons + apple-touch-icon for iOS
       Add to Home Screen. Sources live in /public/icons/. -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#030710">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      /* Visual height of the HUD strip — used for panel sizing only. The
         canvas fills the FULL window underneath; the HUD floats over it
         transparently so the map is visible behind + between the panels.
         Tall enough to give the center panel (BUILD PHASE title + chips +
         status + READY button) generous vertical breathing room. */
      --hud-top-h: 250px;
    }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #cce8ff;
    }
    #hud * { pointer-events: auto; }

    /* ── Top HUD strip (BUILD + PLAN) ─────────────────────────────────────
       Three-panel command deck per reference image. LEFT and RIGHT side
       panels hold the unit/structure tiles (2 rows × 5 cols = 10 each);
       CENTER panel holds the phase banner, credits chip, VS chip, and
       event log. Three small status glyphs cluster in the top-right
       corner outside the panels.

       All panels render their silhouette via inline SVG with non-scaling
       strokes so the corners stay crisp at any width. Content sits over
       the SVG in absolutely-positioned overlays. */
    #hud-top, #hud-top-att {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: var(--hud-top-h);
      display: grid;
      grid-template-columns: 1fr minmax(460px, 38%) 1fr;
      gap: 10px;
      padding: 6px 16px 8px;
      pointer-events: none;
    }
    #hud-top > *, #hud-top-att > * { pointer-events: auto; }

    .hud-panel {
      position: relative;
      min-width: 0;
      height: 100%;
    }
    /* Lock the center panel to grid column 2 so when the LEFT and RIGHT
       shop panels are hidden during PLAN/REVEAL, the center doesn't slide
       to column 1. Without this the auto-placer fills empty cells from the
       start of the grid and the center jumps left. */
    .hud-panel.hud-center { grid-column: 2; }
    .hud-panel .panel-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      /* Softer glow so the panel reads as "part of the game" rather than
         a hard UI window pasted on top. Drop-shadow goes from a sharp
         0.30 to a more diffuse 0.18 over a wider radius. */
      filter: drop-shadow(0 0 10px rgba(90, 167, 212, 0.18));
    }
    .hud-panel[data-side="att"] .panel-frame {
      filter: drop-shadow(0 0 10px rgba(212, 90, 122, 0.18));
    }

    /* Content overlay — sits INSIDE the SVG silhouette. Side panels have
       8px chamfered corners (all four), so content needs at least 10px of
       padding to avoid sitting in a chamfer triangle. Center panel has a
       raised banner on top, so its top inset is deeper. */
    .hud-panel .panel-content {
      position: absolute;
      inset: 10px 12px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hud-center .panel-content {
      /* Full-bleed: content fills the SVG silhouette. The 3-section
         layout (.cc-title / .cc-body / .cc-action) lines up with the
         SVG's internal divider lines (y=58 and y=158 in the viewBox)
         so each subsection occupies its own console "screen". */
      inset: 0;
      padding: 8px 24px;
      justify-content: stretch;
      gap: 0;
    }
    .center-build-info {
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 2fr) minmax(0, 1fr);
      width: 100%;
      height: 100%;
      gap: 0;
    }
    .cc-title {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
    }
    .cc-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 1.2vh, 12px);
      padding: 6px 4px;
    }
    .cc-action {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
    }

    /* ── Tile grid — 4 cols × 2 rows = 8 tiles per side. Tiles are
       content-sized (auto columns/rows) and centered both ways, so the
       cluster sits with breathing room inside the cyan panel border
       instead of stretching tile boxes edge to edge. Unit icons keep
       their existing size — only the surrounding box hugs the content
       tighter. ─────────────────────────────────────────────────────── */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(4, auto);
      grid-template-rows: repeat(2, auto);
      justify-content: center;
      align-content: center;
      gap: 10px;
      width: 100%;
      height: 100%;
    }
    .hud-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1px;
      padding: 4px 6px;
      cursor: pointer;
      background: linear-gradient(180deg, #0d1c2e 0%, #061320 100%);
      border: 1px solid #2a5577;
      color: #88c5e0;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      transition: border-color 0.1s, box-shadow 0.1s, transform 0.06s;
      min-width: 0;
    }
    .hud-tile.att {
      background: linear-gradient(180deg, #2e0d18 0%, #200612 100%);
      border-color: #77294a;
      color: #e088a0;
    }
    .hud-tile:hover {
      border-color: #6ac4ff;
      box-shadow: 0 0 6px rgba(106, 196, 255, 0.55);
      transform: translateY(-1px);
    }
    .hud-tile.att:hover {
      border-color: #ff7a9a;
      box-shadow: 0 0 6px rgba(255, 122, 154, 0.55);
    }
    .hud-tile.selected {
      border-color: #00e0ff;
      background: linear-gradient(180deg, #144066 0%, #082240 100%);
      color: #d0f0ff;
      box-shadow: 0 0 8px rgba(0, 224, 255, 0.65), 0 0 0 1px #00e0ff inset;
    }
    .hud-tile.att.selected {
      border-color: #ff5a78;
      background: linear-gradient(180deg, #5a1230 0%, #2a0612 100%);
      color: #ffd0e0;
      box-shadow: 0 0 8px rgba(255, 90, 120, 0.65), 0 0 0 1px #ff5a78 inset;
    }
    /* Preview pieces previously rendered with a dashed border; user wants
       all tiles in one consistent style now. We keep the .preview class on
       the DOM so we still know which pieces are placeholders, but it no
       longer changes the visual frame. */
    .hud-tile.insufficient { opacity: 0.32; cursor: not-allowed; filter: grayscale(0.5); }
    /* When the WHOLE strip is disabled (PLAN phase), the tiles still show
       but can't be clicked. */
    #hud-top.disabled .tile-grid, #hud-top-att.disabled .tile-grid {
      pointer-events: none;
      opacity: 0.55;
      filter: saturate(0.6);
    }

    .hud-tile .tile-icon {
      width: clamp(46px, 7vh, 64px);
      height: clamp(46px, 7vh, 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 45%, rgba(40, 70, 100, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%);
      border: 1px solid rgba(106, 196, 255, 0.30);
    }
    .hud-tile.att .tile-icon {
      background: radial-gradient(ellipse at 50% 45%, rgba(100, 40, 60, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%);
      border-color: rgba(255, 122, 154, 0.30);
    }
    .hud-tile .tile-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(1.55);
      transform-origin: center 55%;
    }
    .hud-tile.preview .tile-icon img {
      transform: scale(0.78);
      transform-origin: center;
    }
    /* Procedural laser-wall icon — two metallic emitter bars (top + bottom)
       with a cyan energy beam between them. Matches the in-game wall visual
       so the HUD reads consistently. Built with stacked CSS gradients;
       sized by the .tile-icon parent's clamp() so no width/height override
       needed. */
    .hud-tile .icon-wall {
      background:
        linear-gradient(180deg, #6c8294, #2a323c) top    / 100% 18% no-repeat,
        linear-gradient(180deg, #2a323c, #6c8294) bottom / 100% 18% no-repeat,
        linear-gradient(180deg,
          transparent 18%,
          rgba(80, 180, 255, 0.75) 26%,
          rgba(110, 200, 255, 0.95) 50%,
          rgba(80, 180, 255, 0.75) 74%,
          transparent 82%) center / 30% 100% no-repeat,
        radial-gradient(ellipse at center, rgba(56, 130, 220, 0.35) 0%, transparent 65%);
      box-shadow: inset 0 0 12px rgba(56, 130, 220, 0.35);
    }
    .hud-tile.att .icon-wall {
      background:
        linear-gradient(180deg, #6c8294, #2a323c) top    / 100% 18% no-repeat,
        linear-gradient(180deg, #2a323c, #6c8294) bottom / 100% 18% no-repeat,
        linear-gradient(180deg,
          transparent 18%,
          rgba(255, 170, 200, 0.65) 26%,
          rgba(255, 200, 220, 0.95) 50%,
          rgba(255, 170, 200, 0.65) 74%,
          transparent 82%) center / 30% 100% no-repeat,
        radial-gradient(ellipse at center, rgba(255, 122, 154, 0.25) 0%, transparent 65%);
      box-shadow: inset 0 0 12px rgba(255, 122, 154, 0.25);
    }
    .hud-tile .tile-label {
      font-size: clamp(10px, 1.2vh, 12px);
      letter-spacing: 1px;
      margin-top: 2px;
      color: inherit;
    }
    .hud-tile .tile-cost {
      font-size: clamp(10px, 1.2vh, 12px);
      letter-spacing: 0.5px;
      color: #c8ff7a;
      font-weight: bold;
    }

    /* ── Responsive breakpoints ─────────────────────────────────────────
       The three-panel strip is wide; at narrow viewports the tiles get
       crushed (text overlaps, icons collide). Strategy:
         ≥1100px : full 5x2 grid, both side panels visible (default above)
         860-1100: shrink padding + icon, still 5x2
         640-860 : hide RIGHT side panel (duplicates LEFT), give LEFT more room
         ≤640px  : also drop tile labels — icon + cost only, tiles get tiny
       The strip stays at top of viewport at every size, but no longer
       crashes when squeezed. */
    @media (max-width: 1100px) {
      :root { --hud-top-h: 200px; }
      .hud-tile { padding: 3px 4px; }
      .tile-grid { gap: 8px; }
    }
    @media (max-width: 860px) {
      :root { --hud-top-h: 180px; }
      /* Hide the right duplicate panel so the left + center get the full
         viewport width. Grid collapses from 3 columns to 2. */
      #hud-top, #hud-top-att {
        grid-template-columns: 1fr minmax(300px, 42%);
      }
      #hud-top > .hud-panel:nth-child(3),
      #hud-top-att > .hud-panel:nth-child(3) { display: none; }
      .hud-tile { padding: 2px 3px; }
      .tile-grid { gap: 6px; }
    }
    @media (max-width: 640px) {
      :root { --hud-top-h: 160px; }
      /* Drop tile labels so the icon + cost fit in a tiny tile. Players
         can hover for the name (browser tooltip from the data-label). */
      .hud-tile .tile-label { display: none; }
      .hud-center .center-matchup { display: none; }
    }

    /* ── Mobile phone tuning ──────────────────────────────────────────────
       The width-only breakpoints above were tuned for narrow desktop windows.
       Phones add two failure modes: a SHORT landscape viewport, and a tall
       PORTRAIT one where the icon's 7vh term balloons; together with the name
       labels the two tile rows overflow BELOW the panel frame. Fix: on phone-
       sized viewports drop the name labels and cap the icon to a fixed size,
       and keep the strip at 180px (the value proven to fit two rows) so nothing
       spills out. Targeted by ORIENTATION (short landscape OR narrow portrait)
       so a normal desktop window never matches. Paired with the MCC scale-down
       in MiniControlCenter.ts. */
    @media (orientation: landscape) and (max-height: 540px),
           (orientation: portrait)  and (max-width: 540px) {
      :root { --hud-top-h: 180px; }
      .hud-tile .tile-label { display: none; }
      /* Fixed icon: the base clamp() uses 7vh, which balloons on a tall
         portrait phone and shoves the tile rows past the panel frame. */
      .hud-tile .tile-icon { width: 46px; height: 46px; }
      .hud-tile { padding: 2px 4px; }
      .tile-grid { gap: 6px; }
    }
    /* Portrait phone: relax the center floor so the left shop keeps real width
       instead of collapsing to a sliver against the 300px center. */
    @media (orientation: portrait) and (max-width: 540px) {
      #hud-top, #hud-top-att {
        grid-template-columns: 1fr minmax(190px, 44%);
        gap: 6px;
        padding: 4px 8px 6px;
      }
    }
    /* Landscape phone: ~844px wide fits all THREE panels, so un-hide the right
       shop (Mine/Wall/Signal/Shield) that the <=860 rule hides, using a compact
       3-column layout. Without this those four defensive pieces are unbuildable
       on a phone. (Portrait stays 2-column; rotate to landscape for the full
       shop.) */
    @media (orientation: landscape) and (max-height: 540px) {
      #hud-top, #hud-top-att {
        grid-template-columns: 1fr minmax(210px, 30%) 1fr;
        gap: 8px;
      }
      #hud-top > .hud-panel:nth-child(3),
      #hud-top-att > .hud-panel:nth-child(3) { display: block; }
    }
    /* Phone: during the auto-chaining REVEAL the center panel becomes the combat
       log, which on a small screen covers the board and is cramped to read. Hide
       it during reveal so the battle is fully visible (the MCC PAUSE control
       stays in the corner). #hud-top.phase-reveal is stamped by HUD.setPhase. */
    @media (orientation: landscape) and (max-height: 540px),
           (orientation: portrait)  and (max-width: 540px) {
      #hud-top.phase-reveal .hud-panel.hud-center,
      #hud-top-att.phase-reveal .hud-panel.hud-center { display: none; }
    }

    /* ── Center panel content — command-deck centerpiece ──────────────────
       BUILD PHASE is the focal element. We frame it with flanking bracket
       glyphs ([ ]), strong letter-spacing, and a glow. The CR chip and
       VS chip sit beneath as smaller secondary readouts. */
    .hud-center .center-banner-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 0 6px;
    }
    .hud-center .center-phase {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: clamp(12px, 1.6vh, 18px);
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: clamp(18px, 2.6vh, 24px);
      font-weight: 900;
      letter-spacing: clamp(4px, 0.9vh, 7px);
      color: #f4faff;
      white-space: nowrap;
      padding: 2px 6px;
      text-shadow:
        0 0 24px rgba(110, 215, 255, 0.95),
        0 0 8px rgba(80, 200, 255, 0.7),
        0 0 2px rgba(0, 0, 0, 0.9);
    }
    /* Bracket accents on either side of the phase title — read as
       command-deck punctuation, sized to the title height. */
    .hud-center .center-phase::before,
    .hud-center .center-phase::after {
      content: '';
      width: clamp(12px, 1.8vh, 16px);
      height: clamp(12px, 1.8vh, 16px);
      border: 2.5px solid #6ac4ff;
      filter: drop-shadow(0 0 5px rgba(90, 200, 255, 0.75));
    }
    .hud-center .center-phase::before { border-right: none; border-bottom: none; }
    .hud-center .center-phase::after  { border-left:  none; border-top:    none; }
    .hud-panel[data-side="att"] .center-phase {
      text-shadow:
        0 0 24px rgba(255, 110, 145, 0.95),
        0 0 8px rgba(230, 90, 130, 0.7),
        0 0 2px rgba(0, 0, 0, 0.9);
    }
    .hud-panel[data-side="att"] .center-phase::before,
    .hud-panel[data-side="att"] .center-phase::after {
      border-color: #d45a7a;
      filter: drop-shadow(0 0 4px rgba(230, 90, 130, 0.6));
    }
    .hud-center .center-credits {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: clamp(4px, 0.8vh, 6px) clamp(14px, 2vw, 22px);
      background: linear-gradient(180deg, #030710 0%, #0b1320 100%);
      border: 1.5px solid rgba(90, 167, 212, 0.55);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 2px 4px rgba(0, 0, 0, 0.5) inset,
        0 0 10px rgba(90, 167, 212, 0.30);
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: clamp(11px, 1.4vh, 13px);
      font-weight: 500;
      letter-spacing: clamp(2px, 0.4vh, 4px);
      color: rgba(200, 230, 255, 0.75);
    }
    .hud-panel[data-side="att"] .center-credits {
      border-color: rgba(212, 90, 122, 0.45);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 2px 4px rgba(0, 0, 0, 0.5) inset,
        0 0 8px rgba(212, 90, 122, 0.25);
    }
    .hud-center .center-credits .cr-num {
      color: #d4ff7a;
      font-weight: 900;
      font-size: clamp(14px, 1.9vh, 17px);
      margin-left: 6px;
      text-shadow: 0 0 10px rgba(180, 240, 70, 0.85), 0 0 4px rgba(140, 220, 50, 0.7);
    }
    /* Matchup line — PLAYER VS OPPONENT, faction names colored by role
       (defender blue, attacker red). Sits below the centered credits chip. */
    .hud-center .center-matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 2px 10px;
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: clamp(13px, 1.7vh, 16px);
      font-weight: 700;
      letter-spacing: clamp(2px, 0.4vh, 3px);
      color: #8aabc4;
    }
    .hud-center .center-matchup .vs-label { opacity: 0.55; font-size: 0.85em; }
    /* Defender-variant HUD: player is on the LEFT (blue), AI on the RIGHT (red). */
    .hud-panel[data-side="def"] .center-matchup .vs-player {
      font-weight: bold;
      color: #6ac4ff;
      text-shadow: 0 0 6px rgba(60, 170, 230, 0.65);
    }
    .hud-panel[data-side="def"] .center-matchup .vs-team {
      font-weight: bold;
      color: #ff7a9a;
      text-shadow: 0 0 6px rgba(230, 80, 120, 0.65);
    }
    /* Attacker-variant HUD: player is on the LEFT (red), AI on the RIGHT (blue). */
    .hud-panel[data-side="att"] .center-matchup .vs-player {
      font-weight: bold;
      color: #ff7a9a;
      text-shadow: 0 0 6px rgba(230, 80, 120, 0.65);
    }
    .hud-panel[data-side="att"] .center-matchup .vs-team {
      font-weight: bold;
      color: #6ac4ff;
      text-shadow: 0 0 6px rgba(60, 170, 230, 0.65);
    }

    /* (Event log removed — center panel only carries title + VS chip.) */

    /* Hide AI side's HUD entirely. */
    .ai-side { display: none !important; }

    /* ── Center panel: status message + primary action (READY/BATTLE) ───
       Replaces the old #bottom-bar (READY) and #plan-bar (BATTLE + instructions).
       Lives inside each .hud-center .panel-content so the action button is part
       of the command-deck silhouette, not floating at the viewport edge. */
    /* Legacy .center-build-info flex rules replaced by the grid rules
       above (which line up with the SVG divider sections). */
    /* System status line — shows the latest non-combat message in the
       center HUD panel (BUILD PHASE start, AI deployment complete, etc.).
       Single status that updates in-place rather than a scrolling feed —
       the center panel is too narrow to scroll a multi-line feed without
       clipping. During REVEAL the combat log replaces this section. */
    .center-events {
      width: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      font-size: clamp(11px, 1.4vh, 13px);
      letter-spacing: 0.4px;
      line-height: 1.45;
      color: #99bbcc;
      text-align: center;
      padding: 2px 6px;
    }
    .center-events .center-event-system { color: #99bbcc; }
    .center-events .center-event-player { color: #88c5e0; }
    .center-events .center-event-ai     { color: #e08888; }

    /* Primary action button (READY/BATTLE). Styled as a hardware key
       physically recessed into the console — beveled top highlight,
       bottom edge shadow (depth), inner bezel ring, and a glowing
       backlight. Pressed state drops the button 1-2px to feel mechanical.
       Color follows the player's role (.role-defender = blue,
       .role-attacker = red); applied by HUD.setPlayerSide. */
    .center-action-btn {
      margin: 0;
      padding: clamp(8px, 1.3vh, 12px) clamp(36px, 5vw, 56px);
      font-size: clamp(15px, 2vh, 19px);
      font-weight: 900;
      letter-spacing: clamp(4px, 0.9vh, 7px);
      font-family: 'Orbitron', 'Courier New', monospace;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      background: linear-gradient(180deg, #2a323d 0%, #161a22 60%, #0a0d13 100%);
      border: 3px solid #5a7090;
      color: #d8ecff;
      transition: transform 0.07s, box-shadow 0.1s, border-color 0.1s;
    }
    .center-action-btn:active { transform: translateY(2px); }

    .center-action-btn.role-defender {
      background: linear-gradient(180deg, #1c4a78 0%, #0a2848 50%, #03101e 100%);
      border-color: #6ac4ff;
      color: #eaf6ff;
      text-shadow: 0 0 8px rgba(140, 220, 255, 0.55), 0 1px 0 rgba(0, 0, 0, 0.7);
      box-shadow:
        /* Inner bezel ring — thin highlight inset that mimics a milled edge */
        0 0 0 1px rgba(180, 220, 255, 0.35) inset,
        /* Top key highlight (light coming from above) */
        0 2px 0 rgba(220, 240, 255, 0.30) inset,
        /* Bottom inner shadow (key has depth into the console) */
        0 -6px 10px rgba(0, 0, 0, 0.55) inset,
        /* Hard edge shadow below the key — physical depth */
        0 3px 0 rgba(0, 0, 0, 0.55),
        /* Outer glow — backlight bleeding out from under the key */
        0 0 18px rgba(0, 170, 255, 0.55);
    }
    .center-action-btn.role-defender:hover {
      border-color: #b8e0ff;
      color: #f6fcff;
      box-shadow:
        0 0 0 1px rgba(220, 240, 255, 0.55) inset,
        0 2px 0 rgba(220, 240, 255, 0.40) inset,
        0 -6px 10px rgba(0, 0, 0, 0.55) inset,
        0 3px 0 rgba(0, 0, 0, 0.55),
        0 0 28px rgba(0, 200, 255, 0.85);
    }
    .center-action-btn.role-defender:active {
      box-shadow:
        0 0 0 1px rgba(180, 220, 255, 0.35) inset,
        0 2px 0 rgba(220, 240, 255, 0.30) inset,
        0 -3px 8px rgba(0, 0, 0, 0.45) inset,
        0 1px 0 rgba(0, 0, 0, 0.55),
        0 0 22px rgba(0, 200, 255, 0.75);
    }

    .center-action-btn.role-attacker {
      background: linear-gradient(180deg, #5a121c 0%, #2a0610 50%, #100204 100%);
      border-color: #ff8c8c;
      color: #fff0f1;
      text-shadow: 0 0 8px rgba(255, 180, 180, 0.55), 0 1px 0 rgba(0, 0, 0, 0.7);
      box-shadow:
        0 0 0 1px rgba(255, 200, 200, 0.35) inset,
        0 2px 0 rgba(255, 220, 220, 0.30) inset,
        0 -6px 10px rgba(0, 0, 0, 0.55) inset,
        0 3px 0 rgba(0, 0, 0, 0.55),
        0 0 18px rgba(255, 80, 80, 0.55);
    }
    .center-action-btn.role-attacker:hover {
      border-color: #ffc8c8;
      color: #fff8f8;
      box-shadow:
        0 0 0 1px rgba(255, 220, 220, 0.55) inset,
        0 2px 0 rgba(255, 220, 220, 0.40) inset,
        0 -6px 10px rgba(0, 0, 0, 0.55) inset,
        0 3px 0 rgba(0, 0, 0, 0.55),
        0 0 28px rgba(255, 100, 100, 0.85);
    }
    .center-action-btn.role-attacker:active {
      box-shadow:
        0 0 0 1px rgba(255, 200, 200, 0.35) inset,
        0 2px 0 rgba(255, 220, 220, 0.30) inset,
        0 -3px 8px rgba(0, 0, 0, 0.45) inset,
        0 1px 0 rgba(0, 0, 0, 0.55),
        0 0 22px rgba(255, 100, 100, 0.75);
    }

    /* Combat log inside the center panel — replaces banner/stats/message
       during REVEAL. Scrollable; trimmed to ~200 rows by appendCombatLog. */
    .center-log {
      width: 100%;
      height: 100%;
      max-height: 100%;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
      color: #99bbcc;
      padding-right: 4px;
      /* Themed scrollbar — Firefox + WebKit. Without these the default
         scrollbar appears as a thick black/grey vertical bar that looks
         like an unrelated artifact running down the panel. */
      scrollbar-width: thin;
      scrollbar-color: rgba(106, 196, 255, 0.45) transparent;
      text-align: center;
    }
    .center-log::-webkit-scrollbar          { width: 6px; }
    .center-log::-webkit-scrollbar-track    { background: transparent; }
    .center-log::-webkit-scrollbar-thumb    {
      background: rgba(106, 196, 255, 0.40);
      border-radius: 3px;
    }
    .center-log::-webkit-scrollbar-thumb:hover {
      background: rgba(106, 196, 255, 0.65);
    }
    .center-log .log-turn {
      color: #ffcc66;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 6px 0 3px;
      border-bottom: 1px dashed #443322;
      padding-bottom: 2px;
    }
    .center-log .log-turn:first-child { margin-top: 0; }
    .center-log .log-entry { padding: 1px 0; }
    .center-log .log-entry.defender { color: #88bbdd; }
    .center-log .log-entry.attacker { color: #dd8888; }
    .center-log .log-entry.neutral  { color: #ffaa44; font-weight: bold; }
    .center-log .log-empty { color: #556677; font-style: italic; }

    /* Selected-piece panel — top-right corner during planning */
    #plan-selection {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 240px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid #335577;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaccdd;
      line-height: 1.5;
    }
    .plan-sel-header {
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: 0 0 6px currentColor;
    }
    .plan-sel-ap {
      color: #ffee88;
      margin-bottom: 6px;
    }
    .plan-sel-ap strong { color: #fff; font-size: 14px; }
    .plan-sel-queue {
      color: #88aabb;
      font-size: 11px;
      padding-top: 4px;
      border-top: 1px solid #334455;
    }
    .plan-sel-queue em { color: #556677; }

    /* Compass-rose popup — opens with shift+click on a placed firing structure
       during BUILD. Lets the player pay credits to add extra fire-arc facings.
       Positioned absolutely; Game projects the structure's world position to
       screen coords and pins the rose there on open. */
    #compass-rose {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: auto repeat(3, 44px);
      gap: 4px;
      padding: 8px;
      background: rgba(0, 8, 20, 0.92);
      border: 1px solid #2266aa;
      box-shadow: 0 0 18px rgba(0, 80, 160, 0.45);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #aaccdd;
    }
    #compass-rose .rose-title {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #88ccff;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    #compass-rose .rose-title span { flex: 1; text-align: center; }
    #compass-rose .rose-close-btn {
      width: 20px; height: 20px;
      padding: 0;
      background: transparent;
      border: 1px solid #335577;
      color: #99bbcc;
      font-family: inherit;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    #compass-rose .rose-close-btn:hover {
      background: #2a0010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-footer {
      grid-column: 1 / 4;
      margin-top: 4px;
      display: flex; justify-content: center;
    }
    #compass-rose .rose-refund-btn {
      flex: 1;
      padding: 6px 8px;
      background: #2a0008;
      border: 1px solid #661122;
      color: #ddaaaa;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #compass-rose .rose-refund-btn:hover {
      background: #440010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
      cursor: pointer;
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
    }
    #compass-rose .rose-btn:hover { background: #102840; border-color: #2266aa; }
    #compass-rose .rose-btn.active {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      text-shadow: 0 0 6px #00aaff;
    }
    /* Active arcs in multi-mode hover with a refund cue — warm red border
       so the player understands clicking will REMOVE the arc + refund. */
    #compass-rose .rose-btn.active:hover {
      background: #2a0e10;
      border-color: #cc4455;
      color: #ff9999;
      text-shadow: 0 0 6px #cc4455;
    }
    #compass-rose .rose-btn.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }
    #compass-rose .rose-btn .rose-arrow  { font-size: 16px; line-height: 1; }
    #compass-rose .rose-btn .rose-cost   { font-size: 9px; color: #99cc66; }
    #compass-rose .rose-btn .rose-on     { font-size: 8px; color: #66ccff; letter-spacing: 1px; }
    /* Refund cost on active arcs — warm red to mirror the active-hover cue. */
    #compass-rose .rose-btn .rose-refund { font-size: 9px; color: #ff9988; }
    #compass-rose .rose-btn.active:hover .rose-on { color: #ff9988; }
    #compass-rose .rose-center {
      background: transparent;
      border: 1px dashed #335577;
      color: #6699bb;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }

    /* Combat log moved to .center-log inside each hud-center panel —
       see "Center panel: status message + primary action" section. */

    #game-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 52px;
      letter-spacing: 6px;
      text-shadow: 0 0 24px currentColor;
      pointer-events: none;
      text-align: center;
    }
    #game-message small {
      display: block;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.7;
    }
    /* "Play Again" sci-fi action button. Lives inside #game-message, which is
       pointer-events:none — so the button has to re-enable pointer events on
       itself. Chamfered panel + corner brackets + pulsing glow. */
    #play-again-btn {
      display: inline-block;
      position: relative;
      margin-top: 28px;
      padding: 14px 38px;
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      letter-spacing: 4px;
      font-weight: 700;
      color: #d8f5ff;
      background: linear-gradient(180deg, rgba(20, 60, 100, 0.78), rgba(10, 30, 55, 0.92));
      border: 2px solid #6aaadd;
      box-shadow:
        0 0 18px rgba(80, 180, 255, 0.45),
        inset 0 0 18px rgba(60, 140, 220, 0.30);
      cursor: pointer;
      pointer-events: auto;
      text-shadow: 0 0 8px rgba(140, 220, 255, 0.85);
      clip-path: polygon(
        10px 0, calc(100% - 10px) 0, 100% 10px,
        100% calc(100% - 10px), calc(100% - 10px) 100%,
        10px 100%, 0 calc(100% - 10px), 0 10px
      );
      animation: pa-pulse 2.4s ease-in-out infinite;
      transition: background 0.15s, transform 0.08s, color 0.15s, box-shadow 0.15s;
    }
    #play-again-btn:hover {
      color: #ffffff;
      background: linear-gradient(180deg, rgba(40, 100, 160, 0.92), rgba(20, 60, 110, 1.0));
      box-shadow:
        0 0 28px rgba(120, 220, 255, 0.85),
        inset 0 0 22px rgba(120, 220, 255, 0.45);
    }
    #play-again-btn:active {
      transform: translateY(2px);
      box-shadow:
        0 0 12px rgba(120, 220, 255, 0.55),
        inset 0 0 28px rgba(120, 220, 255, 0.55);
    }
    #play-again-btn .pa-label { position: relative; z-index: 1; }
    /* Play arrow — CSS-drawn triangle in the same color as the label.
       Inline ▶ Unicode character rendered as a colorful emoji on macOS
       and didn't match the rest of the button. A border-triangle ensures
       a single-style monochrome arrow that picks up currentColor. */
    #play-again-btn .pa-arrow {
      display: inline-block;
      width: 0; height: 0;
      border-style: solid;
      border-width: 8px 0 8px 13px;
      border-color: transparent transparent transparent currentColor;
      margin-right: 12px;
      vertical-align: middle;
      filter: drop-shadow(0 0 4px rgba(140, 220, 255, 0.8));
    }
    @keyframes pa-pulse {
      0%, 100% { box-shadow:
        0 0 18px rgba(80, 180, 255, 0.45),
        inset 0 0 18px rgba(60, 140, 220, 0.30); }
      50%      { box-shadow:
        0 0 28px rgba(140, 220, 255, 0.70),
        inset 0 0 26px rgba(120, 200, 255, 0.45); }
    }

    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      letter-spacing: 3px;
      color: #4488aa;
    }

    .hidden { display: none !important; }

    /* Single-player gating — the AI's shop panel + credits + team label all
       carry .ai-side after setPlayerSide() runs, hiding them entirely so the
       player can't see or interact with opponent intel. */
    .ai-side { display: none !important; }

    /* ── Side picker (full-screen modal shown after asset preload) ───────
       Two cards (DEFENDER / ATTACKER) on a single row at desktop widths;
       stacks vertically below ~720px. ALL sizes use clamp() so the picker
       adapts smoothly to any viewport — no fixed breakpoints to drop off
       a cliff at. The outer container has overflow:auto and the inner
       wrapper has min-height:100% + flex centering, so content scrolls
       when it overflows but stays centered when it fits. */
    #side-picker {
      position: absolute;
      inset: 0;
      overflow: auto;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.06) 0%, transparent 1px),
        radial-gradient(circle at 75% 70%, rgba(255, 255, 255, 0.04) 0%, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 1px),
        radial-gradient(ellipse at center, rgba(12, 18, 32, 0.92) 0%, rgba(0, 0, 0, 0.98) 70%);
      font-family: 'Courier New', monospace;
      z-index: 100;
    }
    #side-picker .sp-inner {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2.4vh, 22px);
      padding: clamp(16px, 4vh, 32px) clamp(12px, 4vw, 28px);
      box-sizing: border-box;
    }
    #side-picker .sp-title {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(13px, 1.8vh, 17px);
      letter-spacing: clamp(7px, 1.4vh, 13px);
      color: #6ac4ff;
      text-shadow: 0 0 14px rgba(0, 160, 240, 0.45);
    }
    #side-picker .sp-title::before,
    #side-picker .sp-title::after {
      content: '';
      width: clamp(40px, 6vw, 70px);
      height: 1px;
      background: linear-gradient(90deg, transparent, #6ac4ff);
      opacity: 0.55;
    }
    #side-picker .sp-title::after { background: linear-gradient(90deg, #6ac4ff, transparent); }
    #side-picker .sp-headline {
      font-size: clamp(22px, 3.6vh, 32px);
      letter-spacing: clamp(6px, 1.4vh, 12px);
      color: #e6f3ff;
      text-shadow: 0 0 22px rgba(60, 140, 220, 0.7), 0 1px 0 rgba(0, 0, 0, 0.8);
      margin-top: -8px;
    }
    #side-picker .sp-swap {
      align-self: center;
      margin: 0;
      padding: 6px 18px;
      font-family: inherit;
      font-size: clamp(10px, 1.5vh, 13px);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bcd4e8;
      background: linear-gradient(180deg, rgba(40,50,62,0.92), rgba(16,20,26,0.92));
      border: 1px solid #3a4a5c;
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    #side-picker .sp-swap:hover {
      color: #eaf4ff;
      border-color: #5a7088;
      box-shadow: 0 0 14px rgba(90,160,220,0.35);
    }
    #side-picker .sp-swap .sp-swap-icon {
      font-size: 1.25em;
      vertical-align: -2px;
      margin-right: 5px;
    }
    #side-picker .sp-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
      gap: clamp(12px, 2.4vw, 28px);
      width: min(720px, 100%);
      align-items: stretch;
    }
    .sp-card {
      position: relative;
      width: 100%;
      padding: clamp(14px, 2.4vh, 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      background:
        repeating-linear-gradient(60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        repeating-linear-gradient(-60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        linear-gradient(180deg, #2a323d 0%, #161a22 45%, #0a0d13 100%);
      border: 2px solid #3a5570;
      color: #d8ecff;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: transform 0.15s ease-out, border-color 0.15s, box-shadow 0.15s;
      box-shadow:
        0 0 18px rgba(60, 110, 160, 0.28),
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset;
    }
    /* DEFENDER = blue (matches the existing blue defender HUD theme). */
    .sp-card.defender { border-color: #3a5570; box-shadow: 0 0 18px rgba(60, 130, 200, 0.28), 0 1px 0 rgba(255,255,255,0.08) inset, 0 -1px 0 rgba(0,0,0,0.55) inset; }
    .sp-card.defender:hover {
      transform: translateY(-2px);
      border-color: #6ac4ff;
      box-shadow: 0 0 28px rgba(0, 160, 240, 0.55), 0 1px 0 rgba(255,255,255,0.12) inset, 0 -1px 0 rgba(0,0,0,0.55) inset;
    }
    .sp-card.defender .sp-role-label { color: #cfeaff; text-shadow: 0 0 14px rgba(120, 200, 255, 0.55); }
    .sp-card.defender .sp-cta {
      color: #d8ecff;
      background: linear-gradient(180deg, #143a60 0%, #082040 60%, #03101e 100%);
      border-color: #6ac4ff;
    }

    /* ATTACKER = red (matches the existing red attacker HUD theme). */
    .sp-card.attacker { border-color: #7a2630; box-shadow: 0 0 18px rgba(200, 60, 80, 0.28), 0 1px 0 rgba(255,255,255,0.08) inset, 0 -1px 0 rgba(0,0,0,0.55) inset; }
    .sp-card.attacker:hover {
      transform: translateY(-2px);
      border-color: #ff8c8c;
      box-shadow: 0 0 28px rgba(230, 70, 70, 0.55), 0 1px 0 rgba(255,255,255,0.12) inset, 0 -1px 0 rgba(0,0,0,0.55) inset;
    }
    .sp-card.attacker .sp-role-label { color: #ffd8d8; text-shadow: 0 0 14px rgba(255, 130, 130, 0.55); }
    .sp-card.attacker .sp-team-name { color: #cc9494; border-bottom-color: rgba(255, 140, 140, 0.22); }
    .sp-card.attacker .sp-tagline { color: #cc9494; }
    .sp-card.attacker .sp-cta {
      color: #ffdadc;
      background: linear-gradient(180deg, #5a121c 0%, #2a0408 60%, #100204 100%);
      border-color: #ff8c8c;
    }
    .sp-card .sp-role-label {
      font-size: clamp(24px, 3.4vh, 32px);
      font-weight: bold;
      letter-spacing: clamp(5px, 1.1vh, 9px);
      color: #e6f3ff;
      text-shadow: 0 0 12px rgba(140, 200, 255, 0.40);
      margin-bottom: 4px;
    }
    .sp-card .sp-team-name {
      font-size: clamp(14px, 1.8vh, 17px);
      letter-spacing: clamp(2px, 0.4vh, 4px);
      color: #8aaecc;
      margin-bottom: clamp(10px, 1.6vh, 16px);
      padding-bottom: clamp(8px, 1.2vh, 12px);
      border-bottom: 1px solid rgba(106, 196, 255, 0.20);
      width: 80%;
    }
    .sp-card .sp-hero {
      position: relative;
      width: clamp(90px, 13vh, 120px);
      height: clamp(90px, 13vh, 120px);
      margin: 0 auto clamp(10px, 1.5vh, 16px);
      background:
        radial-gradient(ellipse at 50% 45%, rgba(50, 70, 100, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #050810 0%, #020407 100%);
      border: 1px solid #2a3140;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 3px 6px rgba(0, 0, 0, 0.55) inset;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .sp-card .sp-hero img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(1.4);
    }
    .sp-card .sp-tagline {
      font-size: clamp(13px, 1.7vh, 15px);
      letter-spacing: 0.8px;
      line-height: 1.5;
      color: #b0c8dc;
      margin-bottom: clamp(12px, 1.8vh, 18px);
    }
    .sp-card .sp-cta {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: clamp(10px, 1.4vh, 13px) clamp(24px, 3.5vw, 34px);
      font-family: inherit;
      font-size: clamp(15px, 1.9vh, 18px);
      font-weight: bold;
      letter-spacing: clamp(4px, 0.7vh, 6px);
      color: #d8ecff;
      background: linear-gradient(180deg, #143a60 0%, #082040 60%, #03101e 100%);
      border: 2px solid #6ac4ff;
      box-shadow:
        0 0 0 1px rgba(108, 196, 255, 0.25) inset,
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset;
    }
    .sp-card.defender:hover .sp-cta {
      box-shadow:
        0 0 0 1px rgba(108, 196, 255, 0.50) inset,
        0 1px 0 rgba(255, 255, 255, 0.16) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset,
        0 0 18px rgba(0, 160, 240, 0.55);
    }
    .sp-card.attacker:hover .sp-cta {
      box-shadow:
        0 0 0 1px rgba(255, 138, 138, 0.50) inset,
        0 1px 0 rgba(255, 255, 255, 0.16) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset,
        0 0 18px rgba(230, 70, 70, 0.55);
    }
    /* How-to-play collapsible — closed by default; opens to a short
       three-section reference. Width-locked to the cards grid above. */
    #side-picker .sp-howto {
      width: min(720px, 100%);
      font-size: clamp(14px, 1.8vh, 17px);
      color: #b0c8dc;
      background: rgba(0, 0, 0, 0.50);
      border: 1px solid rgba(106, 196, 255, 0.18);
      padding: 0 clamp(14px, 2.6vw, 22px);
    }
    #side-picker .sp-howto[open] { padding-bottom: clamp(14px, 2vh, 20px); }
    #side-picker .sp-howto summary {
      cursor: pointer;
      padding: clamp(12px, 1.8vh, 16px) 0;
      font-weight: bold;
      font-size: clamp(15px, 1.9vh, 18px);
      letter-spacing: 2px;
      color: #d8ecff;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #side-picker .sp-howto summary::before {
      content: '▶';
      font-size: 11px;
      transition: transform 0.2s;
    }
    #side-picker .sp-howto[open] summary::before { transform: rotate(90deg); }
    #side-picker .sp-howto summary::-webkit-details-marker { display: none; }
    #side-picker .sp-howto-body { line-height: 1.6; max-height: 60vh; overflow-y: auto; padding-right: 8px; }
    #side-picker .sp-howto-body p { margin: clamp(6px, 1vh, 10px) 0; }
    #side-picker .sp-howto-body strong { color: #ffd089; letter-spacing: 1px; }
    #side-picker .sp-howto-body h4 {
      color: #6ac4ff;
      font-family: 'Orbitron', monospace;
      font-size: clamp(13px, 1.6vh, 16px);
      letter-spacing: clamp(2px, 0.4vw, 4px);
      margin: clamp(14px, 2vh, 20px) 0 clamp(6px, 1vh, 10px);
      padding-bottom: clamp(3px, 0.6vh, 6px);
      border-bottom: 1px solid rgba(106, 196, 255, 0.25);
    }
    #side-picker .sp-howto-body h4:first-child { margin-top: 0; }
    /* Scroll bar styling so the long body looks intentional inside the
       overflow-y container. */
    #side-picker .sp-howto-body::-webkit-scrollbar { width: 6px; }
    #side-picker .sp-howto-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    #side-picker .sp-howto-body::-webkit-scrollbar-thumb {
      background: rgba(106, 196, 255, 0.4);
      border-radius: 3px;
    }

    /* S17.15 difficulty selector. Sits between the side cards and
       the how-to-play expander. Three buttons (easy / normal / hard)
       horizontally; selected button glows cyan. Mouse-only per the
       no-keyboard rule. Width-locked to the cards grid above for
       visual alignment. */
    #side-picker .sp-difficulty {
      width: min(720px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.2vh, 12px);
      margin-bottom: clamp(12px, 1.6vh, 18px);
    }
    #side-picker .sp-diff-label {
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 1.4vh, 13px);
      letter-spacing: clamp(2px, 0.4vw, 4px);
      color: #88c5e0;
    }
    #side-picker .sp-diff-buttons {
      display: flex;
      gap: clamp(8px, 1.4vw, 14px);
      width: 100%;
      justify-content: center;
    }
    #side-picker .sp-diff-btn {
      flex: 1 1 0;
      max-width: 220px;
      padding: clamp(10px, 1.5vh, 14px) clamp(12px, 1.8vw, 18px);
      background: rgba(8, 18, 32, 0.7);
      border: 1px solid rgba(106, 196, 255, 0.25);
      color: #b0c8dc;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      transition: all 130ms ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    #side-picker .sp-diff-btn:hover {
      border-color: rgba(107, 217, 255, 0.55);
      color: #d8eef9;
    }
    #side-picker .sp-diff-btn.selected {
      border-color: #6bd9ff;
      background: linear-gradient(180deg, rgba(107, 217, 255, 0.18), rgba(8, 18, 32, 0.9));
      color: #ffffff;
      box-shadow: 0 0 14px rgba(107, 217, 255, 0.45), inset 0 0 10px rgba(107, 217, 255, 0.18);
    }
    #side-picker .sp-diff-name {
      font-size: clamp(14px, 1.8vh, 17px);
      font-weight: 700;
      letter-spacing: clamp(2px, 0.4vw, 4px);
    }
    #side-picker .sp-diff-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(10px, 1.2vh, 12px);
      letter-spacing: 0.5px;
      color: #88a4b8;
    }
    #side-picker .sp-diff-btn.selected .sp-diff-sub { color: #b8d8ee; }

    /* ── Session 15: confirmed effects ported from /build-test.html ─────
       Six effects the player picked from the sandbox: tile hover-pop,
       CR bloom pulse (50%), letter-by-letter title reveal, additive-
       blend selection ring, edge-trace orbit on the center panel, and
       a unit icon glow. Each section is scoped tightly so it composes
       with the existing HUD styles instead of replacing them. */

    /* Title boot-reveal: each phase-title character fades in with
       stagger. Spans are emitted by HUD.setPhase(); the animation only
       runs when the spans are first inserted, so each phase change
       gives the new title its own boot-up sequence. The .phase-chars
       wrapper keeps the flex container's child count at 1 so the
       inline-flex `gap` doesn't apply between letters. */
    .center-phase .phase-chars {
      display: inline-block;
    }
    .center-phase .boot-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(-6px);
      animation: phase-boot-in 0.45s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
    }
    @keyframes phase-boot-in {
      from { opacity: 0; transform: translateY(-8px); filter: blur(2px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }

    /* CR bloom pulse (50% intensity per request). Soft breathing glow
       on the credits number; pulsing reads as "console heartbeat". */
    .center-credits .cr-num {
      animation: cr-bloom-pulse 1.8s ease-in-out infinite;
    }
    @keyframes cr-bloom-pulse {
      0%, 100% {
        text-shadow:
          0 0 5px rgba(180, 240, 70, 0.55),
          0 0 10px rgba(140, 220, 50, 0.30);
      }
      50% {
        text-shadow:
          0 0 6px rgba(200, 250, 100, 0.75),
          0 0 14px rgba(180, 240, 70, 0.50),
          0 0 22px rgba(140, 220, 50, 0.30);
      }
    }

    /* Tile hover-pop. Overrides the earlier .hud-tile :hover rule
       with a snappier spring transform + brighter cyan/pink rim. */
    .hud-tile {
      transition: transform 0.18s cubic-bezier(0.34, 1.6, 0.64, 1),
                  box-shadow 0.18s,
                  border-color 0.12s;
    }
    .hud-tile:hover {
      transform: translateY(-3px) scale(1.06);
      border-color: #b8e8ff;
      box-shadow:
        0 0 16px rgba(106, 196, 255, 0.85),
        0 0 0 1px #6ac4ff inset;
    }
    .hud-tile.att:hover {
      border-color: #ffc8d2;
      box-shadow:
        0 0 16px rgba(255, 122, 154, 0.85),
        0 0 0 1px #ff7a9a inset;
    }

    /* Unit icon glow — soft halo around every .tile-icon frame plus a
       brightness/drop-shadow boost on the sprite. Theme-matched. */
    .hud-tile .tile-icon {
      box-shadow:
        0 0 8px rgba(106, 196, 255, 0.30),
        0 0 16px rgba(60, 130, 200, 0.16);
      border-color: rgba(140, 200, 240, 0.45);
    }
    .hud-tile.att .tile-icon {
      box-shadow:
        0 0 8px rgba(255, 122, 154, 0.30),
        0 0 16px rgba(200, 60, 90, 0.16);
      border-color: rgba(255, 170, 190, 0.45);
    }
    .hud-tile .tile-icon img {
      filter:
        brightness(1.10)
        drop-shadow(0 0 3px rgba(180, 220, 255, 0.55));
    }
    .hud-tile.att .tile-icon img {
      filter:
        brightness(1.10)
        drop-shadow(0 0 3px rgba(255, 200, 220, 0.55));
    }
    /* Hover intensifies the icon halo too. */
    .hud-tile:hover .tile-icon {
      box-shadow:
        0 0 10px rgba(106, 196, 255, 0.50),
        0 0 18px rgba(60, 130, 200, 0.25);
      border-color: rgba(180, 220, 255, 0.70);
    }
    .hud-tile.att:hover .tile-icon {
      box-shadow:
        0 0 10px rgba(255, 122, 154, 0.50),
        0 0 18px rgba(200, 60, 90, 0.25);
      border-color: rgba(255, 200, 220, 0.70);
    }

    /* Selection pulse ring — additive (mix-blend-mode: screen) ring
       radiates outward from the selected tile. Loops every 1.5s. */
    .hud-tile.selected {
      overflow: visible;
    }
    .hud-tile.selected::before {
      content: '';
      position: absolute;
      inset: -3px;
      border: 2px solid #00e0ff;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: tile-select-pulse 1.5s ease-out infinite;
    }
    .hud-tile.att.selected::before {
      border-color: #ff5a78;
    }
    @keyframes tile-select-pulse {
      0%   { opacity: 0.95; transform: scale(0.94); }
      80%  { opacity: 0.10; transform: scale(1.18); }
      100% { opacity: 0;    transform: scale(1.20); }
    }

    /* Edge-trace orbit — single glowing dot circles the center panel's
       chamfered perimeter via SVG <animateMotion>. The SVG layer itself
       is emitted by HUD.centerPanelSvg() alongside the panel-frame. */
    .edge-trace {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .edge-trace circle {
      filter:
        drop-shadow(0 0 4px #6ac4ff)
        drop-shadow(0 0 10px #6ac4ff)
        drop-shadow(0 0 18px rgba(0, 140, 220, 0.7));
    }
    /* Hide the orbiting trace dot during REVEAL — the combat log fills the
       center panel and the moving dot reads as visual noise on top of the
       constantly-updating log text. HUD.setPhase adds .phase-reveal to the
       top container when entering REVEAL and removes it on other phases. */
    #hud-top.phase-reveal .edge-trace,
    #hud-top-att.phase-reveal .edge-trace { display: none; }
    .hud-panel[data-side="att"] .edge-trace circle {
      filter:
        drop-shadow(0 0 4px #ff7a9a)
        drop-shadow(0 0 10px #ff7a9a)
        drop-shadow(0 0 18px rgba(230, 80, 120, 0.7));
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
